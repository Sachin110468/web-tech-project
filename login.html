<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url("https://images.unsplash.com/photo-1554224155-6726b3ff858f") no-repeat center center/cover;
}

.overlay {
    background: rgba(0, 0, 0, 0.5);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 350px;
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 12px;
    text-align: center;
}

input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
}

button {
    width: 95%;
    padding: 12px;
    margin-top: 10px;
    cursor: pointer;
}

.login-btn { background: #2c7be5; color: white; }
.register-btn { background: #28a745; color: white; }
.subtitle {
    font-size: 14px;
    color: gray;
    margin-bottom: 10px;
}

.note {
    font-size: 12px;
    color: #555;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="overlay">
<div class="container">

<h2>Expense Tracker</h2>
 <p class="subtitle">Login or Register to continue</p>
<p class="note">New user? Click Register first</p> 

<input type="text" id="username" placeholder="Enter Username">
<input type="password" id="password" placeholder="Enter Password">

<button class="login-btn" onclick="login()">Login</button>
<button class="register-btn" onclick="register()">Register</button>

</div>
</div>

<script>

function register() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
        alert("Enter all fields");
        return;
    }

    console.log(" Sending:", username, password);

    fetch("http://localhost:5000/register", {
        method: "POST",
        headers: { 
            "Content-Type": "application/json" 
        },
        body: JSON.stringify({ username, password })
    })
    .then(res => {
        console.log(" Status:", res.status);
        return res.json();
    })
    .then(data => {
    
        console.log(" REGISTER RESPONSE:", JSON.stringify(data, null, 2));

        
        if (data && data.success === true) {
            alert("Registered Successfully ");
        } else {
            alert(data?.message || "Something went wrong ");
        }
    })
    .catch(err => {
        console.log(" ERROR:", err);
        alert("Server error");
    });
}
function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
        alert("Enter all fields");
        return;
    }

    fetch("http://localhost:5000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    })
    .then(res => res.json())
    .then(data => {
        console.log("LOGIN:", data);

        if (data.success) {
            localStorage.setItem("userId", data.userId);
            localStorage.setItem("username", username);  
            window.location.href = "index.html";
        } else {
            alert("Invalid Login ❌");
        }
    })
    .catch(() => alert("Server error"));
}

</script>

</body>
</html>
