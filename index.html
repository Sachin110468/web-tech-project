<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<header class="header">
<h1>Expense Tracker</h1>
<p>Manage your daily income and expenses</p>
</header>

<section class="grid">

<div class="card balance">
<h2>Total Balance</h2>
<p>₹ <span id="balance">0</span></p>
</div>

<div class="card income">
<h2>Total Income</h2>
<p>₹ <span id="income-total">0</span></p>
</div>

<div class="card expense">
<h2>Total Expense</h2>
<p>₹ <span id="expense-total">0</span></p>
</div>

</section>

<section class="card">
<h2>Add Transaction</h2>

<form id="transaction-form">

<label>Amount</label>
<input type="number" id="amount" placeholder="Enter amount" required>

<label>Type</label>
<select id="type">
<option value="Income">Income</option>
<option value="Expense">Expense</option>
</select>

<label>Category</label>
<input type="text" id="category" placeholder="Food / Travel / Fees / Custom" required>

<label>Date</label>
<input type="date" id="date">

<label>Notes</label>
<input type="text" id="notes" placeholder="Optional">

<button type="submit">Add Transaction</button>

</form>
</section>

<section class="card">
<h2>Recent Transactions</h2>
<ul id="transaction-list">
</ul>
</section>

<footer>
<p>Developed by Sachin Mishra  PBL Project</p>
</footer>

</div>
<script src="js/script.js"></script>

</body>
</html>
