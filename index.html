<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>


<script>
if (!localStorage.getItem("userId")) {
    alert("Please login first");
    window.location.href = "login.html";
}
</script>

<div class="container">

<header class="header">
<h1>Expense Tracker</h1>
<p id="welcomeUser"></p>

<button onclick="logout()" style="float:right;">Logout</button>
</header>

<section class="grid">

<div class="card balance">
<h2>Total Balance</h2>
<p>₹ <span id="balance">0</span></p>
</div>

<div class="card income">
<h2>Total Income</h2>
<p>₹ <span id="income-total">0</span></p>
</div>

<div class="card expense">
<h2>Total Expense</h2>
<p>₹ <span id="expense-total">0</span></p>
</div>

</section>

<section class="grid" id="category-cards"></section>

<section class="card">
<h2>Add Transaction</h2>

<form id="transaction-form">

<label>Amount</label>
<input type="number" id="amount" required>

<label>Type</label>
<select id="type">
<option value="Income">Income</option>
<option value="Expense">Expense</option>
</select>

<label>Category</label>
<input type="text" id="category" list="category-options" required>

<datalist id="category-options">
<option value="Food">
<option value="Travel">
<option value="Shopping">
<option value="Bills">
<option value="Salary">
<option value="Rent">
<option value="Entertainment">
<option value="Education">
<option value="Medical">
</datalist>

<label>Date</label>
<input type="date" id="date">

<label>Notes</label>
<input type="text" id="notes">

<button type="submit">Add Transaction</button>

</form>
</section>

<section class="card">
<h2>Recent Transactions</h2>
<ul id="transaction-list"></ul>
</section>

<section class="card">
<h2>Category Summary</h2>
<p id="category-summary"></p>

<div style="width:300px; margin:auto;">
<canvas id="myChart"></canvas>
</div>

</section>

<section class="card">
<button onclick="downloadData()">Download Data</button>
</section>

<footer>
<p>Developed by Sachin Mishra</p>
</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/script.js"></script>

<script>

function logout() {
    localStorage.removeItem("userId");
    window.location.href = "login.html";
}


document.getElementById("welcomeUser").innerText =
    "Welcome, " + localStorage.getItem("userId");
</script>

</body>
</html>
